openapi: 3.0.3
info:
  title: pft
  version: 1.0.0
  description: Personal Finance Tracker API Documentation
paths:
  /api/token/:
    post:
      operationId: token_create
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
      responses:
        '200':
          description: JWT token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPairResponse'
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: Refreshed access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
  /api/v1/register/:
    post:
      operationId: v1_register_create
      tags:
        - v1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
  /api/v1/me/:
    get:
      operationId: v1_me_retrieve
      tags:
        - v1
      security:
        - jwtAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
  /api/v1/profile/update/:
    put:
      operationId: v1_profile_update_update
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
    patch:
      operationId: v1_profile_update_partial_update
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
  /api/v1/profile/change-password/:
    post:
      operationId: v1_profile_change_password_create
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/categories/:
    get:
      operationId: v1_categories_list
      tags:
        - v1
      security:
        - jwtAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoryList'
    post:
      operationId: v1_categories_create
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
  /api/v1/categories/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: v1_categories_retrieve
      tags:
        - v1
      security:
        - jwtAuth: []
      responses:
        '200':
          description: Category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
    put:
      operationId: v1_categories_update
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
    patch:
      operationId: v1_categories_partial_update
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
    delete:
      operationId: v1_categories_destroy
      tags:
        - v1
      security:
        - jwtAuth: []
      responses:
        '204':
          description: Category deleted
  /api/v1/transactions/:
    get:
      operationId: v1_transactions_list
      tags:
        - v1
      security:
        - jwtAuth: []
      parameters:
        - name: ordering
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTransactionList'
    post:
      operationId: v1_transactions_create
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '201':
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
  /api/v1/transactions/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: v1_transactions_retrieve
      tags:
        - v1
      security:
        - jwtAuth: []
      responses:
        '200':
          description: Transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
    put:
      operationId: v1_transactions_update
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '200':
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
    patch:
      operationId: v1_transactions_partial_update
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '200':
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
    delete:
      operationId: v1_transactions_destroy
      tags:
        - v1
      security:
        - jwtAuth: []
      responses:
        '204':
          description: Transaction deleted
  /api/v1/budgets/:
    get:
      operationId: v1_budgets_list
      tags:
        - v1
      security:
        - jwtAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Budget list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBudgetList'
    post:
      operationId: v1_budgets_create
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetRequest'
      responses:
        '201':
          description: Budget created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
  /api/v1/budgets/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: v1_budgets_retrieve
      tags:
        - v1
      security:
        - jwtAuth: []
      responses:
        '200':
          description: Budget
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
    put:
      operationId: v1_budgets_update
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetRequest'
      responses:
        '200':
          description: Budget updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
    patch:
      operationId: v1_budgets_partial_update
      tags:
        - v1
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetRequest'
      responses:
        '200':
          description: Budget updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
    delete:
      operationId: v1_budgets_destroy
      tags:
        - v1
      security:
        - jwtAuth: []
      responses:
        '204':
          description: Budget deleted
components:
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TypeEnum:
      type: string
      enum:
        - income
        - expense
    DepartmentEnum:
      type: string
      enum:
        - engineering
        - finance
        - hr
        - marketing
        - sales
        - other
    RoleEnum:
      type: string
      enum:
        - admin
        - manager
        - employee
    TokenObtainPairRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    TokenObtainPairResponse:
      type: object
      required:
        - access
        - refresh
      properties:
        access:
          type: string
        refresh:
          type: string
    TokenRefreshRequest:
      type: object
      required:
        - refresh
      properties:
        refresh:
          type: string
    TokenRefreshResponse:
      type: object
      required:
        - access
      properties:
        access:
          type: string
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - confirm_password
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        password:
          type: string
        confirm_password:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        phone_number:
          type: string
        location:
          type: string
        bio:
          type: string
        department:
          $ref: '#/components/schemas/DepartmentEnum'
    RegisterResponse:
      type: object
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        phone_number:
          type: string
        location:
          type: string
        bio:
          type: string
        department:
          $ref: '#/components/schemas/DepartmentEnum'
    UserProfile:
      type: object
      required:
        - id
        - email
        - role
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone_number:
          type: string
        location:
          type: string
        bio:
          type: string
        department:
          $ref: '#/components/schemas/DepartmentEnum'
        role:
          $ref: '#/components/schemas/RoleEnum'
    UserProfileUpdateRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        phone_number:
          type: string
        location:
          type: string
        bio:
          type: string
        department:
          $ref: '#/components/schemas/DepartmentEnum'
    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
        - confirm_password
      properties:
        current_password:
          type: string
        new_password:
          type: string
        confirm_password:
          type: string
    MessageResponse:
      type: object
      properties:
        message:
          type: string
        error:
          type: string
    Category:
      type: object
      required:
        - id
        - name
        - type
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          $ref: '#/components/schemas/TypeEnum'
        user:
          type: integer
          nullable: true
    CategoryRequest:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/TypeEnum'
    Transaction:
      type: object
      required:
        - id
        - user
        - title
        - amount
        - type
        - transaction_date
      properties:
        id:
          type: integer
        user:
          type: integer
        title:
          type: string
        amount:
          type: string
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        type:
          $ref: '#/components/schemas/TypeEnum'
        category:
          type: integer
          nullable: true
        transaction_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TransactionRequest:
      type: object
      required:
        - title
        - amount
        - type
        - category
        - transaction_date
      properties:
        user:
          type: integer
        title:
          type: string
        amount:
          type: string
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        type:
          $ref: '#/components/schemas/TypeEnum'
        category:
          type: integer
        transaction_date:
          type: string
          format: date
    Budget:
      type: object
      required:
        - id
        - user
        - category
        - month
        - year
        - amount_limit
      properties:
        id:
          type: integer
        user:
          type: integer
        category:
          type: integer
        month:
          type: integer
          minimum: 1
          maximum: 12
        year:
          type: integer
        amount_limit:
          type: string
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
    BudgetRequest:
      type: object
      required:
        - category
        - month
        - year
        - amount_limit
      properties:
        category:
          type: integer
        month:
          type: integer
          minimum: 1
          maximum: 12
        year:
          type: integer
        amount_limit:
          type: string
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
    PaginatedCategoryList:
      type: object
      required:
        - count
        - next
        - previous
        - results
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    PaginatedTransactionList:
      type: object
      required:
        - count
        - next
        - previous
        - results
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
    PaginatedBudgetList:
      type: object
      required:
        - count
        - next
        - previous
        - results
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Budget'
